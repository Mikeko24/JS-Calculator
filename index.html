<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div id="display" contenteditable="true" spellcheck="false"></div>
        </div>
        
        <div class="mode-toggle">
            <button id="modeToggle" class="toggle-btn">Scientific</button>
        </div>
        
        <!-- Scientific Functions (hidden by default) -->
        <div class="scientific-buttons" id="scientificButtons">
            <button class="sci-btn" data-value="sin(">sin</button>
            <button class="sci-btn" data-value="cos(">cos</button>
            <button class="sci-btn" data-value="tan(">tan</button>
            <button class="sci-btn" data-value="log(">log</button>
            <button class="sci-btn" data-value="ln(">ln</button>
            <button class="sci-btn" data-value="sqrt(">√</button>
            <button class="sci-btn" data-value="^">^</button>
            <button class="sci-btn" data-value="(">(</button>
            <button class="sci-btn" data-value=")">)</button>
            <button class="sci-btn" data-value="π">π</button>
            <button class="sci-btn" data-value="e">e</button>
            <button class="sci-btn" data-value="1/2">½</button>
            <button class="sci-btn" data-value="1/3">⅓</button>
            <button class="sci-btn" data-value="/">÷</button>
        </div>
        
        <div class="buttons">
            <!-- Normal Buttons -->
            <button class="btn clear" data-value="C">C</button>
            <button class="btn clear" data-value="backspace">⌫</button>
            <button class="btn" data-value="(">(</button>
            <button class="btn" data-value=")">)</button>
            <button class="btn operator" data-value="/">÷</button>
            
            <button class="btn" data-value="7">7</button>
            <button class="btn" data-value="8">8</button>
            <button class="btn" data-value="9">9</button>
            <button class="btn operator" data-value="*">×</button>
            
            <button class="btn" data-value="4">4</button>
            <button class="btn" data-value="5">5</button>
            <button class="btn" data-value="6">6</button>
            <button class="btn operator" data-value="-">-</button>
            
            <button class="btn" data-value="1">1</button>
            <button class="btn" data-value="2">2</button>
            <button class="btn" data-value="3">3</button>
            <button class="btn operator" data-value="+">+</button>
            
            <button class="btn" data-value="0">0</button>
            <button class="btn" data-value=".">.</button>
            <button class="btn equals" data-value="=">=</button>
        </div>
    </div>
    
    <script src="js/script.js"></script>
</body>
</html>
